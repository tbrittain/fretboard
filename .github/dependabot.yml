version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      storybook:
        patterns:
          - "@storybook/*"
          - "@chromatic-com/*"
          - "storybook"
      svelte:
        patterns:
          - "svelte"
          - "svelte-*"
          - "@sveltejs/*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
